<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
}

.hero-content {
  position: relative;
  z-index: 2;
  animation: fadeIn 1.5s ease;
}

.logo {
  font-size: 60px;
  font-weight: bold;
  background: linear-gradient(90deg, gold, orange, gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  margin-top: 10px;
  color: #ddd;
}

/* SEÇÕES */
section {
  padding: 50px 20px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  width: 180px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

/* PREÇOS */
.price {
  font-size: 20px;
  margin-top: 10px;
  color: gold;
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 30px;
  background: linear-gradient(45deg, gold, orange);
  color: black;
  padding: 15px 30px;
  text-decoration: none;
  font-weight: bold;
  border-radius: 30px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* BOTÃO FIXO WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* ANIMAÇÕES */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* RESPONSIVO */
@media (max-width: 600px) {
  .logo {
    font-size: 40px;
  }

  .card {
    width: 90%;
  }
}
</style>
</head>

<!-- CTA FINAL -->
<section>

  <a class="btn" href="https://wa.me/5531982560088">Chamar no WhatsApp</a>

<a class="whatsapp" href="https://wa.me/5531982560088" target="_blank">
