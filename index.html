<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brian Barber | Barbeiro em Dom Joaquim</title>

  <meta property="og:title" content="Brian Barber - Barbearia em Dom Joaquim">
  <meta property="og:description" content="Cortes modernos, degradê, barba e estilo. Agende seu horário agora!">
  <meta property="og:image" content="https://images.unsplash.com/photo-1585747860715-2ba37e788b70">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70') no-repeat center/cover;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(0,0,0,0.85);
      min-height: 100vh;
      padding: 20px;
      animation: fadeIn 1.5s ease;
    }

    header {
      padding: 40px 20px 20px;
    }

    /* LOGO */
    .logo {
      font-size: 50px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 4px;
      background: linear-gradient(90deg, gold, orange, gold);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }

    p {
      color: #ddd;
      font-size: 16px;
    }

    /* SERVIÇOS */
    .services {
      margin-top: 30px;
    }

    .services h2 {
      margin-bottom: 15px;
      font-size: 26px;
      letter-spacing: 2px;
    }

    .card {
      background: rgba(255,255,255,0.12);
      margin: 12px auto;
      padding: 18px;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      transition: transform 0.3s, background 0.3s;
      font-size: 17px;
      font-weight: bold;
    }

    .card:hover {
      transform: scale(1.07);
      background: rgba(255,255,255,0.2);
    }

    /* BOTÃO */
    .btn {
      display: inline-block;
      margin-top: 35px;
      background: linear-gradient(45deg, gold, orange);
      color: black;
      padding: 16px 32px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      transition: 0.3s;
      font-size: 16px;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* ANIMAÇÕES */
    @keyframes shine {
      to {
        background-position: 200% center;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVO */
@media (max-width: 600px) {
  .logo {
    font-size: 32px;
  }

  .services h2 {
    font-size: 22px;
  }

  p {
    font-size: 14px;
  }

  .card {
    font-size: 15px;
    padding: 14px;
    max-width: 90%;
  }

  .btn {
    font-size: 14px;
    padding: 12px 22px;
  }
}
  </style>
</head>

<body>

<div class="overlay">

<header>
  <h1 class="logo">✂ Brian Barber</h1>
</header>

<p>📍 Dom Joaquim</p>
<p>🕒 Atendimento: 09h às 20h</p>

<section class="services">
  <h2>Serviços</h2>

  <div class="card">Social</div>
  <div class="card">Degradê</div>
  <div class="card">Barba</div>
  <div class="card">Pigmentação</div>
  <div class="card">Luzes</div>

  <a class="btn" href="https://wa.me/5531982560088" target="_blank">
    Agendar no WhatsApp
  </a>
</section>

</div>

</body>
</html>
